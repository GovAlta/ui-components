<h2>Circular progress indicator</h2>

<h3>Basic progress</h3>
<goab-circular-progress variant="inline" size="large" message="Loading message..." [visible]="true"></goab-circular-progress>

<h3>Sizes</h3>
<goab-circular-progress variant="inline" size="small" message="Loading message..." [visible]="true"></goab-circular-progress>
<goab-circular-progress variant="inline" size="large" message="Loading message..." [visible]="true"></goab-circular-progress>

<h3>With progress value</h3>
<goab-circular-progress variant="inline" size="large" [progress]="75" message="75% complete" [visible]="true"></goab-circular-progress>
