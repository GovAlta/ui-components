<h2>Pagination</h2>

<h3>Basic pagination</h3>
<goab-pagination
  [pageNumber]="basicPage"
  [itemCount]="100"
  [perPageCount]="10"
  (onChange)="handleBasicPageChange($event)">
</goab-pagination>

<h3>Simple</h3>
<goab-pagination
  [pageNumber]="simplePage"
  [itemCount]="50"
  [perPageCount]="10"
  variant="links-only"
  (onChange)="handleSimplePageChange($event)">
</goab-pagination>

<h2>Examples</h2>

<h3>Show number of results per page</h3>
<goab-table width="100%" mb="xl">
  <thead>
    <tr>
      <th>First name</th>
      <th>Last name</th>
      <th>Age</th>
    </tr>
  </thead>
  <tbody>
    @for (user of pageUsers; track user.id) {
      <tr>
        <td>{{ user.firstName }}</td>
        <td>{{ user.lastName }}</td>
        <td>{{ user.age }}</td>
      </tr>
    }
  </tbody>
</goab-table>

<goab-block alignment="center" width="100%">
  <goab-block mb="m" alignment="center">
    Show
    <goab-dropdown
      (onChange)="handlePerPageCountChangeEvent($event)"
      [value]="perPage.toString()"
      width="9ch">
      <goab-dropdown-item value="10" label="10"></goab-dropdown-item>
      <goab-dropdown-item value="20" label="20"></goab-dropdown-item>
      <goab-dropdown-item value="30" label="30"></goab-dropdown-item>
    </goab-dropdown>
    <span style="width: 75px">per page</span>
  </goab-block>

  <goab-spacer hSpacing="fill"></goab-spacer>

  <goab-pagination
    [itemCount]="users.length"
    [perPageCount]="perPage"
    [pageNumber]="page"
    (onChange)="handlePageChange($event)">
  </goab-pagination>
</goab-block>
