<h2>Linear progress indicator</h2>

<h3>Basic progress</h3>
<goab-linear-progress [progress]="50" percentVisibility="hidden"></goab-linear-progress>

<h3>Progress levels</h3>
<goab-linear-progress [progress]="0"></goab-linear-progress>
<goab-linear-progress [progress]="25"></goab-linear-progress>
<goab-linear-progress [progress]="50"></goab-linear-progress>
<goab-linear-progress [progress]="75"></goab-linear-progress>
<goab-linear-progress [progress]="100"></goab-linear-progress>

<h3>Indeterminate</h3>
<goab-linear-progress percentVisibility="hidden"></goab-linear-progress>

<h3>With percentage</h3>
<goab-linear-progress [progress]="65"></goab-linear-progress>
