<svg width="750" height="401" viewBox="0 0 750 401" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated dark mode feature toggle with subtle grid movement">
<style>
  .mode-bg { animation: modeBackground 10s ease-in-out infinite; }
  .mode-panel { animation: modePanel 10s ease-in-out infinite; }

  svg > path:nth-of-type(1),
  svg > path:nth-of-type(n+6):not(.grid-star):not(.inner-orbit):not(.static-grid),
  svg > circle:nth-of-type(n+2):not(.click-ring) {
    transform-box: view-box;
    transform-origin: center;
    animation: outlineBreath 10s ease-in-out infinite;
  }

  svg > path[fill="#0075D7"]:nth-of-type(n+15):not(.grid-star) {
    transform-box: view-box;
    transform-origin: center;
    animation: fillBreath 10s ease-in-out infinite;
  }

  .inner-orbit { transform-box: fill-box; transform-origin: center; animation: innerOrbitGrow 10s ease-in-out infinite; }
  .grid-star { transform-box: fill-box; transform-origin: center; animation: gridStarTurn 10s ease-in-out infinite; }
  .sun-button, .moon-button { transform-box: fill-box; transform-origin: center; }
  .sun-button { animation: sunButtonHover 10s ease-in-out infinite; }
  .moon-button { animation: moonButtonHover 10s ease-in-out infinite; }
  .click-ring { transform-box: fill-box; transform-origin: center; opacity: 0; animation: clickRing 10s ease-in-out infinite; }
  .sun-ring { animation-name: sunClickRing; }
  .cursor { transform-box: fill-box; transform-origin: 12.5px 4.1px; animation: cursorTravel 10s ease-in-out infinite; filter: drop-shadow(0 3px 6px rgba(0, 117, 215, 0.22)); }
  .cursor-shape { animation: cursorPress 10s ease-in-out infinite; }

  @keyframes modeBackground { 0%, 31% { fill: #ffffff; } 43%, 82% { fill: #1E1E1E; } 94%, 100% { fill: #ffffff; } }
  @keyframes modePanel { 0%, 31% { fill: #ffffff; } 43%, 82% { fill: #1E1E1E; } 94%, 100% { fill: #ffffff; } }
  @keyframes outlineBreath {
    0%, 27%, 43%, 78%, 94%, 100% { transform: translate(0, 0) scale(1); stroke-opacity: 1; }
    36% { transform: translate(0.8px, -0.5px) scale(1.004); stroke-opacity: 0.88; }
    86% { transform: translate(-0.7px, 0.5px) scale(0.996); stroke-opacity: 0.92; }
  }
  @keyframes fillBreath {
    0%, 30%, 45%, 80%, 95%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
    37% { transform: translate(0.8px, -0.5px) scale(1.004); opacity: 0.9; }
    87% { transform: translate(-0.7px, 0.4px) scale(0.996); opacity: 0.92; }
  }
  @keyframes innerOrbitGrow {
    0%, 30%, 45%, 80%, 95%, 100% { transform: scale(1); opacity: 1; }
    37% { transform: scale(1.16); opacity: 0.9; }
    87% { transform: scale(0.94); opacity: 0.94; }
  }
  @keyframes gridStarTurn {
    0%, 30%, 45%, 80%, 95%, 100% { transform: rotate(0deg) scale(1); opacity: 1; }
    37% { transform: rotate(12deg) scale(1.018); opacity: 0.9; }
    87% { transform: rotate(-9deg) scale(0.988); opacity: 0.94; }
  }
  @keyframes moonButtonHover { 0%, 7%, 25%, 100% { transform: scale(1); } 12%, 18%, 24% { transform: scale(1.045); } 21% { transform: scale(1.015); } }
  @keyframes sunButtonHover { 0%, 54%, 76%, 100% { transform: scale(1); } 59%, 68%, 75% { transform: scale(1.045); } 72% { transform: scale(1.015); } }
  @keyframes clickRing { 0%, 17%, 27%, 100% { opacity: 0; transform: scale(0.76); } 21% { opacity: 0.5; transform: scale(1); } 25% { opacity: 0; transform: scale(1.22); } }
  @keyframes sunClickRing { 0%, 68%, 78%, 100% { opacity: 0; transform: scale(0.76); } 72% { opacity: 0.5; transform: scale(1); } 76% { opacity: 0; transform: scale(1.22); } }
  @keyframes cursorTravel {
    0% { transform: translate(514px, 250px) rotate(-7deg); }
    8% { transform: translate(395.7px, 196.8px) rotate(-7deg); }
    12% { transform: translate(395.7px, 196.8px) rotate(-7deg); }
    14% { transform: translate(392.7px, 194.8px) rotate(-9deg); }
    16% { transform: translate(398.7px, 197.8px) rotate(-5deg); }
    18% { transform: translate(394.7px, 195.8px) rotate(-8deg); }
    21% { transform: translate(395.7px, 196.8px) rotate(-7deg) scale(0.94); }
    24% { transform: translate(395.7px, 196.8px) rotate(-7deg); }
    43% { transform: translate(395.7px, 196.8px) rotate(-7deg); }
    55% { transform: translate(311.8px, 196.8px) rotate(-7deg); }
    62% { transform: translate(311.8px, 196.8px) rotate(-7deg); }
    65% { transform: translate(308.8px, 194.8px) rotate(-9deg); }
    67% { transform: translate(314.8px, 197.8px) rotate(-5deg); }
    69% { transform: translate(310.8px, 195.8px) rotate(-8deg); }
    72% { transform: translate(311.8px, 196.8px) rotate(-7deg) scale(0.94); }
    75% { transform: translate(311.8px, 196.8px) rotate(-7deg); }
    90% { transform: translate(311.8px, 196.8px) rotate(-7deg); }
    100% { transform: translate(514px, 250px) rotate(-7deg); }
  }
  @keyframes cursorPress { 0%, 19%, 24%, 70%, 75%, 100% { transform: translate(0, 0); } 21%, 72% { transform: translate(1px, 2px); } }

  @media (prefers-reduced-motion: reduce) {
    .mode-bg, .mode-panel, .click-ring, .cursor, .cursor-shape,
    svg > path:nth-of-type(1), svg > path:nth-of-type(n+6):not(.grid-star):not(.inner-orbit):not(.static-grid), svg > circle:nth-of-type(n+2):not(.click-ring),
    svg > path[fill="#0075D7"]:nth-of-type(n+15):not(.grid-star), .inner-orbit, .grid-star, .sun-button, .moon-button { animation: none; }
  }
</style>
