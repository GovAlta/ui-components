name: PR Preview (GitHub Pages)

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches:
      - dev

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Build docs for preview
        if: github.event.action != 'closed'
        env:
          PREVIEW_SITE: https://govalta.github.io
          PREVIEW_BASE: /ui-components/pr-preview/pr-${{ github.event.number }}/
        run: |
          npm ci --legacy-peer-deps
          cd docs && npm ci --legacy-peer-deps && cd ..
          npm run build:prod

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist/docs
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
