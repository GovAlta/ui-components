<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>React Playground</title>
    <script type="text/javascript">
      // spa-github-pages: redirect deep links back to index.html with the path
      // encoded in the query string. The decoder in index.html restores the URL.
      // pathSegmentsToKeep = 3 covers /ui-components/pr-preview-react/pr-<N>/
      (function () {
        var pathSegmentsToKeep = 3;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
