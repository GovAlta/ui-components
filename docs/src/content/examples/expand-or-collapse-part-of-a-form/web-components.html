<style>
  dl.accordion-example {
    margin: 0 0;
  }

    color: var(--goa-color-text-default);

  }

<goa-accordion heading="Contact information">
  <dl class="accordion-example">
    <dt>Name</dt>
    <dd>Joan Smith</dd>
    <dt>Contact preference</dt>

  </dl>
