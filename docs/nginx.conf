events {
  worker_connections  1024;
}

http {
  sendfile on;
  include mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;
    root /opt/app-root/src;
    index index.html;

    port_in_redirect off;

    location ~* \.(png|jpg|jpeg|svg|webp)$ {
      expires 7d;
      add_header Cache-Control "public, no-transform";
    }

    location ~* \.(js|css)$ {
      expires 1d;
      add_header Cache-Control "public, no-transform";
    }

    location / {
      gzip on;
      try_files $uri $uri/ =404;
    }
  }
}
